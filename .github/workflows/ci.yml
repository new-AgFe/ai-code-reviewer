name: AI Code Reviewer CI

on:
  pull_request: # PR이 생성되거나 업데이트될 때 실행
    branches: [ "main" ]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write # PR에 댓글을 쓸 권한
      contents: read
      
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install axios # axios 설치 보장

      - name: Run AI Code Review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # GitHub이 자동 생성해주는 토큰 사용
        run: node scripts/review.js